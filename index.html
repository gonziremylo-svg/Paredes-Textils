<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Paredes Textil</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#0e1320;
color:white;
margin:0;
}

header{
background:#1146a8;
padding:20px;
display:flex;
align-items:center;
gap:20px;
}

header img{
height:50px;
border-radius:10px;
}

.container{
padding:20px;
}

h2{
margin-top:40px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #333;
text-align:left;
}

input{
width:100%;
background:#1c2238;
border:none;
color:white;
padding:6px;
border-radius:4px;
}

.total{
font-weight:bold;
color:#6fffc2;
}

button{
background:#1146a8;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1f5cd6;
}

.search{
margin-top:20px;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>
<img src="logo.jpg">
<h1>Paredes Textil</h1>
</header>

<div class="container">

<h2>Stock</h2>

<input class="search" id="buscar" placeholder="Buscar tela o color">

<table id="tablaStock">
<thead>
<tr>
<th>Artículo</th>
<th>Color</th>
<th>Bacacay</th>
<th>Depósito</th>
<th>Total</th>
</tr>
</thead>

<tbody id="stockBody">
</tbody>
</table>

<h2>Cuentas Corrientes</h2>

<div id="clientes"></div>

</div>

<script>

let stock = [

{articulo:"CALCERO FRIZADO",color:"BLANCO",bacacay:0,deposito:1952},
{articulo:"CALCERO FRIZADO",color:"NEGRO",bacacay:0,deposito:5497},
{articulo:"CALCERO FRIZADO",color:"AZUL",bacacay:0,deposito:1915},

{articulo:"DARLON GLITTER",color:"CORAZON BEIGE",bacacay:351,deposito:0},
{articulo:"DARLON GLITTER",color:"CORAZON NEGRO",bacacay:832,deposito:0},

{articulo:"DARLON LUMINOSO",color:"ESTRELLA CELESTE",bacacay:925,deposito:0}

]

function renderStock(){

let body=document.getElementById("stockBody")
body.innerHTML=""

stock.forEach((s,i)=>{

let total=s.bacacay+s.deposito

body.innerHTML+=`
<tr>
<td>${s.articulo}</td>

<td>${s.color}</td>

<td>
<input value="${s.bacacay}" onchange="stock[${i}].bacacay=parseFloat(this.value);renderStock()">
</td>

<td>
<input value="${s.deposito}" onchange="stock[${i}].deposito=parseFloat(this.value);renderStock()">
</td>

<td class="total">${total}</td>

</tr>
`

})

}

renderStock()

let clientes = [

{
nombre:"PEDRO Y CELIA LOCAL",
ars:10825770,
usd:0
},

{
nombre:"MARIANA PACHECO",
ars:929700,
usd:0
},

{
nombre:"MARCELO GUSMAN",
ars:45366490,
usd:0
},

{
nombre:"ROGER ZITANA",
ars:0,
usd:11599
}

]

function renderClientes(){

let cont=document.getElementById("clientes")

clientes.forEach(c=>{

cont.innerHTML+=`

<div style="background:#1c2238;padding:10px;margin-bottom:10px;border-radius:8px">

<b>${c.nombre}</b><br>

ARS: ${c.ars.toLocaleString()}<br>
USD: ${c.usd.toLocaleString()}

</div>

`

})

}

renderClientes()

document.getElementById("buscar").addEventListener("input",function(){

let v=this.value.toLowerCase()

document.querySelectorAll("#tablaStock tbody tr").forEach(r=>{

if(r.innerText.toLowerCase().includes(v))
r.style.display=""
else
r.style.display="none"

})

})

</script>

</body>
</html>
